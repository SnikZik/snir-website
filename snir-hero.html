<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SNIR. Hero</title>
  <style>
:root {
  --paper: #F2EFEA;
  --ink: #0A0A0A;
  --purple: #6E3CFF;
  --purple-soft: #B9A4FF;
  --muted: #5A5A5A;
}

/* ============================================================
   HERO — Desktop (default, 1440 × 780)
   ============================================================ */

.hero {
  position: relative;
  background: var(--paper);
  color: var(--ink);
  height: 780px;
  overflow: hidden;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}

/* TOPBAR — z 7 */
.hero__topbar {
  position: absolute;
  inset: 0 0 auto 0;
  height: 72px;
  padding: 0 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 7;
}

.hero__logo {
  font-weight: 900;
  font-size: 22px;
  letter-spacing: -0.02em;
  color: var(--ink);
  text-decoration: none;
}

.hero__logo .dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--purple);
  margin-left: 2px;
  transform: translateY(-2px);
}

.hero__nav {
  display: flex;
  gap: 32px;
}

.hero__nav a {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  text-decoration: none;
}

.hero__cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--ink);
  color: #fff;
  padding: 10px 18px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
}

.hero__cta .dot {
  width: 6px;
  height: 6px;
  background: var(--purple);
  display: inline-block;
}

.hero__menu {
  display: none;
}

/* COPY — z 6 */
.hero__copy {
  position: absolute;
  left: 96px;
  top: 208px;
  z-index: 6;
  width: max-content;
}

.hero__title {
  margin: 0;
  font-weight: 900;
  font-size: 104px;
  line-height: 0.92;
  letter-spacing: -0.035em;
  display: flex;
  flex-wrap: wrap;
  column-gap: 0.22em;
  row-gap: 0;
}

.hero__title .word {
  white-space: nowrap;
  display: inline-block;
}

/* Line break: 0-height element forces wrap before "Build", leaving Build+fast on line 2 */
.hero__lb {
  flex-basis: 100%;
  height: 0;
}

.hero__title .dot {
  display: inline-block;
  width: 14px;
  height: 14px;
  background: var(--purple);
  margin-left: 6px;
  transform: translateY(-2px);
}

.hero__sub {
  margin: 28px 0 0;
  font-size: 20px;
  line-height: 1.45;
  color: #2A2A2A;
  font-weight: 400;
}

.hero__sub a {
  color: var(--purple);
  font-weight: 500;
  text-decoration: none;
}

.hero__lead {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-top: 40px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  text-decoration: none;
}

.hero__lead::before {
  content: "";
  display: inline-block;
  width: 32px;
  height: 1.5px;
  background: var(--ink);
}

.hero__lead .dot {
  width: 6px;
  height: 6px;
  background: var(--purple);
  display: inline-block;
  margin-left: 4px;
}

/* DECORATION — z 1..4 */

/* Glow — z 1 */
.hero__glow {
  position: absolute;
  z-index: 1;
  pointer-events: none;
  width: 640px;
  height: 640px;
  right: -80px;
  top: 60px;
  background: radial-gradient(
    closest-side,
    rgba(110, 60, 255, 0.55) 0%,
    rgba(110, 60, 255, 0.28) 38%,
    rgba(185, 164, 255, 0.08) 70%,
    transparent 100%
  );
  filter: blur(2px);
}

/* BUILD word — z 2 */
.hero__build {
  position: absolute;
  z-index: 2;
  pointer-events: none;
  right: 80px;
  bottom: 40px;
  font-weight: 900;
  font-size: 280px;
  line-height: 0.85;
  letter-spacing: -0.05em;
  color: rgba(110, 60, 255, 0.10); /* locked — do not raise opacity */
}

/* Rings — z 3 */
.hero__rings {
  position: absolute;
  z-index: 3;
  pointer-events: none;
  width: 500px;
  height: 500px;
  right: 40px;
  top: 80px;
}

/* Knight — z 4 */
.hero__knight {
  position: absolute;
  z-index: 4;
  pointer-events: none;
  width: 540px;
  height: auto;
  right: -40px;
  bottom: 0;
  object-fit: contain;
  display: block;
}

/* ============================================================
   MOBILE — @media (max-width: 768px) — 390 × 720
   ============================================================ */

@media (max-width: 768px) {
  .hero {
    height: 720px;
  }

  /* Topbar */
  .hero__topbar {
    height: 64px;
    padding: 0 20px;
  }

  .hero__logo {
    font-size: 20px;
  }

  .hero__logo .dot {
    width: 6px;
    height: 6px;
  }

  .hero__nav,
  .hero__cta {
    display: none;
  }

  .hero__menu {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    width: 24px;
    height: 16px;
    background: none;
    border: 0;
    padding: 0;
    margin-left: auto;
  }

  .hero__menu span {
    display: block;
    height: 2px;
    background: var(--ink);
  }

  /* Copy */
  .hero__copy {
    left: 24px;
    top: 96px;
  }

  .hero__title {
    font-size: 54px;
    line-height: 0.95;
    letter-spacing: -0.03em;
    column-gap: 0;
  }

  .hero__title .word {
    flex-basis: 100%; /* every word on its own line */
  }

  .hero__lb {
    display: none; /* mobile uses word-level breaks instead */
  }

  .hero__title .dot {
    width: 9px;
    height: 9px;
    margin-left: 4px;
  }

  .hero__sub {
    margin-top: 20px;
    font-size: 14px;
  }

  .hero__lead {
    margin-top: 24px;
    font-size: 12px;
    gap: 10px;
  }

  .hero__lead::before {
    width: 24px;
  }

  .hero__lead .dot {
    width: 5px;
    height: 5px; /* purple square IS present on mobile */
  }

  /* Decoration */
  .hero__glow {
    width: 360px;
    height: 360px;
    right: -40px;
    top: 380px;
  }

  .hero__build {
    right: 8px;
    bottom: 300px;
    font-size: 110px;
  }

  .hero__rings {
    width: 280px;
    height: 280px;
    right: -40px;
    top: 380px;
  }

  .hero__knight {
    width: 260px;
    right: -30px;
  }
}

  </style>
</head>
